<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat — Live Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d; }
  header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
  .room-info { font-size: 12px; color: #8b949e; }
  .room-info span { color: #58a6ff; }
  .main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 10px 14px; border-radius: 8px; max-width: 80%; word-wrap: break-word; line-height: 1.5; font-size: 14px; }
  .msg.me { background: #1f6feb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.them { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg .name { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
  .msg .time { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }
  .input-area { display: flex; gap: 8px; padding: 12px 20px; background: #161b22; border-top: 1px solid #30363d; }
  .input-area input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-size: 14px; outline: none; }
  .input-area input:focus { border-color: #58a6ff; }
  .input-area input:disabled { opacity: 0.5; }
  .input-area button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .input-area button:hover { background: #2ea043; }
  .input-area button:disabled { opacity: 0.5; cursor: default; }
  .status-bar { padding: 6px 20px; font-size: 11px; color: #8b949e; background: #161b22; border-top: 1px solid #30363d; text-align: center; }
  .status-bar.connected { color: #3fb950; }
</style>
</head>
<body>

<header>
  <h1>&#10022; Chat</h1>
  <div class="room-info">Room: <span id="roomId">---</span></div>
</header>

<div class="main">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<div class="status-bar" id="statusBar">Connecting...</div>

<script src="https://unpkg.com/mqtt@5.10.3/dist/mqtt.min.js"></script>
<script>
const roomEl = document.getElementById('roomId');
const messagesEl = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusBar = document.getElementById('statusBar');

let client, myName;

function getRoomId() {
  const hash = location.hash.replace('#', '');
  if (hash) return hash;
  const id = Math.random().toString(36).substring(2, 8);
  history.replaceState(null, '', '#' + id);
  return id;
}

function randomName() {
  const n = Math.floor(Math.random() * 1000);
  return 'little>buddy>' + n;
}

function connect(roomId) {
  myName = randomName();
  statusBar.textContent = 'Connecting as ' + myName + '...';

  client = mqtt.connect('wss://test.mosquitto.org:8081', {
    clientId: 'chat_' + Math.random().toString(36).substring(2, 10)
  });

  client.on('connect', () => {
    statusBar.textContent = 'Connected';
    statusBar.className = 'status-bar connected';
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
    roomEl.textContent = roomId;

    client.subscribe('chat/' + roomId, { qos: 0 });

    client.publish('chat/' + roomId, JSON.stringify({
      type: 'join', name: myName
    }));
  });

  client.on('message', (topic, payload) => {
    try {
      const data = JSON.parse(payload.toString());
      if (data.type === 'msg') {
        addMessage(data.name, data.text, data.time);
      } else if (data.type === 'join' && data.name !== myName) {
        addSystemMessage(data.name + ' joined');
      }
    } catch(e) {}
  });

  client.on('close', () => {
    statusBar.textContent = 'Disconnected';
    statusBar.className = 'status-bar';
    msgInput.disabled = true;
    sendBtn.disabled = true;
  });
}

function addMessage(name, text, time) {
  const div = document.createElement('div');
  div.className = name === myName ? 'msg me' : 'msg them';
  div.innerHTML = '<div class="name">' + esc(name) + '</div>' + esc(text) + '<div class="time">' + (time || '') + '</div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:#8b949e;padding:4px;';
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !client) return;
  msgInput.value = '';
  const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  addMessage(myName, text, timeStr);
  client.publish('chat/' + getRoomId(), JSON.stringify({
    type: 'msg', name: myName, text: text, time: timeStr
  }));
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

// Auto-connect on page load
const roomId = getRoomId();
roomEl.textContent = roomId + ' (starting...)';
connect(roomId);
</script>

</body>
</html>
